            .nav-active {

<body class="bg-gray-50 text-dark">
    <!-- 顶部导航栏 -->

                <button data-type="cad" class="category-btn px-4 py-2 rounded-lg bg-white border border-gray-200 hover:bg-gray-100 transition-all">CAD设计</button>
                <button data-type="3d" class="category-btn px-4 py-2 rounded-lg bg-white border border-gray-200 hover:bg-gray-100 transition-all">3D设计</button>
                <button data-type="mechanical" class="category-btn px-4 py-2 rounded-lg bg-white border border-gray-200 hover:bg-gray-100 transition-all">机械设计</button>
                <button data-type="electronics" class="category-btn px-4 py-2 rounded-lg bg-white border border-gray-200 hover:bg-gray-100 transition-all">电子电路</button>
                <button data-type="simulation" class="category-btn px-4 py-2 rounded-lg bg-white border border-gray-200 hover:bg-gray-100 transition-all">仿真模拟</button>
                <button data-type="理科工具" class="category-btn px-4 py-2 rounded-lg bg-white border border-gray-200 hover:bg-gray-100 transition-all">理科工具</button>
                <button data-type="dev" class="category-btn px-4 py-2 rounded-lg bg-white border border-gray-200 hover:bg-gray-100 transition-all">开发编程</button>
                <button data-type="utility" class="category-btn px-4 py-2 rounded-lg bg-white border border-gray-200 hover:bg-gray-100 transition-all">系统工具</button>
            </div>
        </section>

        <!-- 软件列表卡片容器 -->
        <div id="softList" class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-6">
            <!-- JS动态渲染卡片 -->
        </div>

        <!-- 无数据提示 -->
        <div id="emptyTip" class="hidden py-20 text-center text-gray-400">
            <i class="fa fa-search text-5xl mb-4"></i>
            <p class="text-lg">未找到匹配的软件</p>
        </div>

        <!-- 免责声明 -->

                <p>请立即联系994469639@qq.com及时做删除处理！</p>
            </div>
        </section>
    </main>

    <!-- 页脚 -->

            <p>静态软件资源目录 © 2026 All Rights Reserved | 纯静态本地网页，无需服务器</p>
        </div>
    </footer>

            },
            {
                id: 18,

            {

            {

            },
            {
                id: 21,
                name: "Origin",
                desc: "科学数据分析、图表绘制工具",
                category: "science",
                icon: "fa fa-line-chart",
                update: "2026-07-12",
                link: "#download"
            },
        ]

        // 全局变量
        let currentCat = "all";
        const listBox = document.getElementById('softList');
        const emptyTip = document.getElementById('emptyTip');
        const searchInput = document.getElementById('searchInput');
        const categoryBtns = document.querySelectorAll('.category-btn');

        // 渲染软件卡片
        function renderList() {
            let filterData = softData;
            // 分类筛选
            if (currentCat !== 'all') {
                filterData = filterData.filter(item => item.category === currentCat)
            }
            // 搜索过滤
            const keyword = searchInput.value.trim().toLowerCase();
            if (keyword) {
                filterData = filterData.filter(item => 
                    item.name.toLowerCase().includes(keyword) || item.desc.toLowerCase().includes(keyword)
                )
            }
            // 空数据判断
            if (filterData.length === 0) {
                listBox.innerHTML = '';
                emptyTip.classList.remove('hidden');
                return;
            } else {
                emptyTip.classList.add('hidden');
            }
            // 生成HTML
            let html = '';
            filterData.forEach(item => {
                html += `
                <a href="${item.link}" class="block bg-white rounded-xl p-5 card-shadow hover:shadow-lg transition-all group cursor-pointer">
                    <div class="flex items-start gap-4">
                        <div class="w-12 h-12 rounded-lg bg-primary/10 flex items-center justify-center text-primary text-xl">
                            <i class="fa ${item.icon}"></i>
                        </div>
                        <div class="flex-1">
                            <h3 class="font-bold text-lg group-hover:text-primary transition-colors">${item.name}</h3>
                            <p class="text-gray-500 text-sm mt-1 line-clamp-2">${item.desc}</p>
                        </div>
                    </div>
                    <div class="mt-4 flex items-center justify-between text-xs text-gray-400">
                       
                        <span>更新：${item.update}</span>
                    </div>
                    <div class="block w-full mt-4 py-2 text-center rounded-lg bg-primary/10 text-primary font-medium hover:bg-primary hover:text-white transition-all">
                        <i class="fa fa-download mr-1"></i>查看详情
                    </div>
                </a>
                `
            })
            listBox.innerHTML = html;
        }

        // 分类切换事件
        categoryBtns.forEach(btn => {
            btn.addEventListener('click', () => {
                // 重置按钮样式
                categoryBtns.forEach(b => {
                    b.classList.remove('nav-active');
                    b.classList.add('bg-white', 'border', 'border-gray-200');
                })
                btn.classList.add('nav-active');
                btn.classList.remove('bg-white', 'border', 'border-gray-200');
                currentCat = btn.dataset.type;
                renderList();
            })
        })

        // 搜索输入监听
        searchInput.addEventListener('input', renderList);

        // 页面初始化渲染
        window.onload = renderList;
    </script>
</body>
</html>
